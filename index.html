<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cardo｜找到真正懂你的人</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=Noto+Serif+TC:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   CARDO 全域設計系統
   深藍黑大理石 · 金色塔羅 · 藍綠星雲
═══════════════════════════════════════════ */
:root {
  --gold:        #e8b84b;
  --gold-bright: #f5d07a;
  --gold-dim:    #a07828;
  --gold-glow:   rgba(232,184,75,0.4);
  --teal:        #00c8be;
  --teal-glow:   rgba(0,180,170,0.35);
  --bg-card:     rgba(6,14,30,0.82);
  --text-cream:  #f0e6cc;
  --text-gold:   #d4a840;
  --text-muted:  rgba(180,160,110,0.5);
  --font-display:'Cinzel Decorative',serif;
  --font-title:  'Cinzel',serif;
  --font-body:   'Noto Serif TC',serif;
  --font-em:     'IM Fell English',serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;overflow-x:hidden;font-family:var(--font-body);}

/* ── 背景 Canvas ── */
#bgCanvas{position:fixed;inset:0;z-index:0;width:100%;height:100%;}

/* ── 星雲光暈層 ── */
.nebula-layer{position:fixed;inset:0;z-index:1;pointer-events:none;}
.nb{position:absolute;border-radius:50%;filter:blur(70px);}
.nb1{width:70%;height:60%;top:-10%;right:-15%;
  background:radial-gradient(ellipse,rgba(0,100,140,0.22) 0%,rgba(0,60,100,0.1) 45%,transparent 70%);}
.nb2{width:60%;height:55%;bottom:-10%;left:-10%;
  background:radial-gradient(ellipse,rgba(50,0,120,0.2) 0%,rgba(20,0,80,0.08) 45%,transparent 70%);}
.nb3{width:40%;height:40%;top:35%;left:30%;
  background:radial-gradient(ellipse,rgba(0,140,160,0.1) 0%,transparent 70%);}

/* ── 星塵 Canvas ── */
#starCanvas{position:fixed;inset:0;z-index:2;pointer-events:none;width:100%;height:100%;}

/* ── 頁面 ── */
.page{
  position:relative;z-index:10;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 20px 48px;
}
.main-layout{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:30px;
  width:100%;
  max-width:1200px;
}
.right-panel{
  width:100%;
}

@media(min-width:1040px){
  .page{padding:48px 30px 48px;}
  .main-layout{flex-direction:row;align-items:center;justify-content:center;gap:32px;}
  .right-panel{max-width:560px;display:flex;flex-direction:column;align-items:center;margin-left:24px;}
}

/* Logo 與卡片樣式保持不變（省略以節省篇幅，實際複製時請保留你原本的完整 style） */
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="nebula-layer">
  <div class="nb nb1"></div>
  <div class="nb nb2"></div>
  <div class="nb nb3"></div>
</div>
<canvas id="starCanvas"></canvas>

<div class="page">
  <div class="main-layout">
    <div class="right-panel">
      <div class="logo-wrap">
        <div class="eclipse">
          <div class="eclipse-ring"></div>
          <div class="eclipse-inner">
            <div class="eclipse-star">✦</div>
          </div>
        </div>
        <div class="logo-name">Cardo</div>
        <div class="logo-tagline">找到真正懂你的人</div>
      </div>

      <div class="card">
        <div class="card-nebula"></div>
        <div class="card-border"></div>
        <div class="card-glow"></div>
        <div class="corner-line cl-tl"></div>
        <div class="corner-line cl-tr"></div>
        <div class="corner-line cl-bl"></div>
        <div class="corner-line cl-br"></div>

        <div class="card-inner">
          <div class="card-header-deco">
            <span class="deco-moon-top">☽ ✦ ☾</span>
            <div class="deco-line">
              <div class="deco-line-seg"></div>
              <div class="deco-star-mid">✦ ✦ ✦</div>
              <div class="deco-line-seg"></div>
            </div>
          </div>

          <div class="tabs">
            <button class="tab active" onclick="sw('login')">登 入</button>
            <button class="tab" onclick="sw('register')">註 冊</button>
          </div>

          <div class="msg" id="msg"></div>

          <!-- ==================== 登入面板 ==================== -->
          <div class="panel on" id="p-login">
            <div class="fg">
              <label class="fl">電子郵件</label>
              <input class="fi" type="email" id="l-email" placeholder="your@email.com">
            </div>
            <div class="fg">
              <label class="fl">密碼</label>
              <input class="fi" type="password" id="l-pw" placeholder="••••••••"
                onkeydown="if(event.key==='Enter')login()">
            </div>
            <button class="btn" id="l-btn" onclick="login()">進 入 宇 宙</button>
            
            <!-- 新增的 Google 登入按鈕 -->
            <button class="btn" onclick="googleLogin()" 
              style="background:#4285f4; color:white; margin-top:12px; border:none; font-weight:500;">
              用 Google 帳號登入
            </button>
          </div>

          <!-- ==================== 註冊面板 ==================== -->
          <div class="panel" id="p-reg">
            <div class="fg">
              <label class="fl">電子郵件</label>
              <input class="fi" type="email" id="r-email" placeholder="your@email.com">
            </div>
            <div class="fg">
              <label class="fl">密碼（至少 8 位）</label>
              <input class="fi" type="password" id="r-pw" placeholder="••••••••">
            </div>
            <div class="fg">
              <label class="fl">確認密碼</label>
              <input class="fi" type="password" id="r-pw2" placeholder="••••••••"
                onkeydown="if(event.key==='Enter')register()">
            </div>
            <button class="btn" id="r-btn" onclick="register()">開 始 探 索</button>
          </div>

          <div class="card-footer">
            <div class="footer-deco">
              <div class="footer-deco-line"></div>
              <div class="footer-deco-dot">✦ ✦ ✦</div>
              <div class="footer-deco-line"></div>
            </div>
            <div class="footer-text">不看臉 · 只看靈魂</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
